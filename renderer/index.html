<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MusicBar</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Header tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="now-playing">Now Playing</button>
      <button class="tab" data-tab="queue">Queue</button>
    </div>

    <!-- Now Playing Panel -->
    <div id="now-playing" class="panel active">
      <div id="not-playing" class="empty-state" style="display:none">
        <div class="empty-icon">♪</div>
        <p>Music is not playing</p>
        <button id="launch-btn" class="launch-btn">Open Music.app</button>
      </div>

      <div id="player-view">
        <!-- Album art -->
        <div class="artwork-wrap">
          <div class="artwork" id="artwork">
            <div class="artwork-placeholder">♫</div>
          </div>
        </div>

        <!-- Track info -->
        <div class="track-info">
          <div class="track-name" id="track-name">—</div>
          <div class="track-artist" id="track-artist">—</div>
          <div class="track-album" id="track-album">—</div>
        </div>

        <!-- Progress -->
        <div class="progress-wrap">
          <span class="time" id="current-time">0:00</span>
          <div class="progress-bar" id="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
            <div class="progress-thumb" id="progress-thumb"></div>
          </div>
          <span class="time" id="total-time">0:00</span>
        </div>

        <!-- Controls -->
        <div class="controls">
          <button class="ctrl-btn mode-btn" id="shuffle-btn" title="Shuffle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="16 3 21 3 21 8"></polyline>
              <line x1="4" y1="20" x2="21" y2="3"></line>
              <polyline points="21 16 21 21 16 21"></polyline>
              <line x1="15" y1="15" x2="21" y2="21"></line>
            </svg>
          </button>
          <button class="ctrl-btn" id="prev-btn" title="Previous">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <polygon points="19 20 9 12 19 4 19 20"></polygon>
              <line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2.5"></line>
            </svg>
          </button>
          <button class="ctrl-btn play-btn" id="play-btn" title="Play/Pause">
            <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none">
              <rect x="6" y="4" width="4" height="16"></rect>
              <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
          </button>
          <button class="ctrl-btn" id="next-btn" title="Next">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 4 15 12 5 20 5 4"></polygon>
              <line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2.5"></line>
            </svg>
          </button>
          <button class="ctrl-btn mode-btn" id="repeat-btn" title="Repeat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="17 1 21 5 17 9"></polyline>
              <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
              <polyline points="7 23 3 19 7 15"></polyline>
              <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
            </svg>
          </button>
        </div>

        <!-- Volume -->
        <div class="volume-wrap">
          <svg class="vol-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path id="vol-waves" d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          </svg>
          <div class="volume-slider-wrap">
            <input type="range" id="volume-slider" class="volume-slider" min="0" max="100" value="50" />
          </div>
          <span class="vol-label" id="vol-label">50</span>
        </div>
      </div>
    </div>

    <!-- Queue Panel -->
    <div id="queue" class="panel">
      <div class="queue-header">
        <span class="queue-title">Up Next</span>
        <button class="refresh-btn" id="refresh-queue">↻</button>
      </div>
      <div class="queue-list" id="queue-list">
        <div class="queue-loading">Loading queue…</div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
